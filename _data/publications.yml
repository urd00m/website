# To add a new paper, prepend a new entry to this list (newest first).
#
# Schema (all fields optional except `title`):
#   title             paper title (rendered bold)
#   authors           HTML string; wrap your own name in <u>...</u>; can use
#                     <sup>*</sup> or other HTML for equal-contrib markers
#   venue             venue / status line (rendered italic)
#                     for unpublished entries, set this to e.g. "Under submission :D"
#   links             list of { label, url } — e.g. Website / Paper / Code / Arxiv
#   cves              list of { id, url }
#   acknowledgements  list of { label, url } — vendor acknowledgements
#   patches           list of { label, url } — upstream patch links
#   awards            single line, e.g. "3x Google VRP Reward :D"
#   news              list of { outlet, url } — press coverage

